name: skin_care
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.5 <4.0.0'   # متوافق مع Dart 3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  ## Presentation
  flutter_svg: ^2.0.5
  barcode_scan2: ^4.3.3
  syncfusion_flutter_charts: ^28.2.6

  ## Providers
  cloud_firestore: ^5.4.4
  firebase_database: ^11.0.2
  firebase_messaging: ^15.1.3
  http: ^1.6.0

  ## Services
  flutter_dotenv: ^5.0.2
  logger: ^2.5.0
  min_id: ^1.1.0
  intl: ^0.20.2
  image_picker: ^1.1.2
  dio: ^5.9.0
  shared_preferences: ^2.2.2
  font_awesome_flutter: ^10.8.0
  form_controller: ^0.8.4
  google_fonts: ^6.3.0
  awesome_notifications: ^0.10.1

  ## Firebase
  firebase_auth: ^5.3.1
  permission_handler: ^11.3.1

  ## Other Utilities
  google_maps_flutter: ^2.2.8
  multi_dropdown: ^3.0.0
  qr_flutter: ^4.0.0
  timelines_plus: ^1.0.4
  google_sign_in: ^6.2.2
  url_launcher: ^6.2.2

  ## Misc
  stack_trace: any
  firebase_core: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # استخدم نسخة أقدم متوافقة مع Dart 3.5
  auto_route_generator: ^8.0.0
  build_runner: ^2.1.8

  flutter_application_id: ^2.0.0-dev
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.2

flutter:
